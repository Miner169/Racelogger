<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Bib Logger</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans select-none pb-16">

    <!-- Compact Header Status Bar -->
    <header class="bg-blue-600 px-4 py-1.5 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2.5">
            <h1 class="text-base font-black tracking-wider">RACE LOG</h1>
            <span id="syncStatus" class="text-[10px] bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold">Auto-Sync Enabled</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleSettings()" class="text-white hover:text-gray-200 text-lg p-1" title="Settings">⚙️</button>
            <button onclick="installApp()" id="installBtn" class="hidden text-[10px] bg-white text-blue-600 px-2.5 py-1 rounded-md font-bold shadow hover:bg-gray-100 transition">📲 Install App</button>
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4">⚙️ App Settings</h3>
            <label class="block text-xs text-gray-400 mb-1 font-semibold">Google Apps Script Web App URL</label>
            <input type="text" id="syncUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            <div class="flex gap-2 justify-end">
                <button onclick="toggleSettings()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">Save URL</button>
            </div>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-md mx-auto w-full flex flex-col gap-4">
        <!-- Checkpoint Setup Panel -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow transition-all duration-300">
            <div id="setupHeaderRow" class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <span>1. Setup</span>
                    <span id="setupSummary" class="hidden text-[11px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded font-mono font-bold uppercase"></span>
                </h2>
                <button onclick="toggleLock()" id="lockBtn" class="text-xs bg-gray-700 hover:bg-gray-600 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1">🔓 Unlock Settings</button>
            </div>
            <div id="setupFields" class="grid grid-cols-2 gap-3 transition-all duration-300">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Checkpoint Name</label>
                    <input type="text" id="checkpoint" placeholder="e.g. CP 1" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Volunteer Initials</label>
                    <input type="text" id="volunteer" placeholder="e.g. John" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
            </div>
        </section>

        <!-- Fast Entry Log Form -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">2. Enter Bib</h2>
            <div class="flex gap-3 items-stretch">
                <div class="flex-grow">
                    <input type="tel" id="bibInput" inputmode="numeric" pattern="[0-9]*" placeholder="0" class="w-full h-16 bg-gray-700 text-center text-4xl font-black text-white border-2 border-gray-600 rounded-xl px-2 focus:outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="checkDuplicateAndLog()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-extrabold text-lg px-6 rounded-xl shadow-lg transition duration-150 flex items-center justify-center">LOG</button>
            </div>
            <div class="mt-1 relative">
                <label id="remarkLabel" class="block text-xs text-gray-400 mb-1 font-semibold">Remark (Optional)</label>
                <input type="text" id="remarkInput" onfocus="clearInlineToast()" placeholder="e.g. Missed helper, penalty, etc." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-200">
            </div>
        </section>

        <!-- Stats Panel -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700 text-center">
                <div class="text-xs text-gray-400 font-semibold mb-1">Total Logs</div>
                <div id="totalCount" class="text-2xl font-black text-blue-400">0</div>
            </div>
            <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700 text-center">
                <div class="text-xs text-gray-400 font-semibold mb-1">Unique Runners</div>
                <div id="uniqueCount" class="text-2xl font-black text-indigo-400">0</div>
            </div>
        </div>

        <!-- Scan History -->
        <section class="flex-grow bg-gray-800 rounded-xl border border-gray-700 shadow flex flex-col overflow-hidden min-h-[200px]">
            <div class="px-4 py-3 border-b border-gray-700 flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Local Scan History</h3>
                    <button onclick="clearDatabase()" class="text-xs text-red-400 hover:text-red-300 font-bold">Clear All</button>
                </div>
                <div class="relative">
                    <input type="text" id="searchBar" oninput="loadHistory()" placeholder="🔍 Filter by Bib, Checkpoint, or Name..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </div>
            <div id="logList" class="overflow-y-auto flex-grow divide-y divide-gray-700 max-h-[300px]"></div>
        </section>

        <!-- Export -->
        <section class="flex flex-col gap-2">
            <button onclick="exportCSV()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-black py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2">📥 Export & Download CSV</button>
        </section>
    </main>

    <script>
        let db;
        let deferredPrompt;
        let isSetupLocked = false;
        let inlineToastTimeout;
        
        const DEFAULT_SYNC_URL = "https://script.google.com/macros/s/AKfycbweiZ7rijKmR-D-gwG9SMDTj_ehesBP_85hqAWipzVpGjFMk4d2MTZh2FUQZfpMqy7Kiw/exec";
        
        let syncUrl = localStorage.getItem("syncUrl") || DEFAULT_SYNC_URL;
        if (!syncUrl || syncUrl.trim() === "") {
            syncUrl = DEFAULT_SYNC_URL;
            localStorage.setItem("syncUrl", DEFAULT_SYNC_URL);
        }

        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/tablet|ipad|playbook|silk/i.test(ua)) return "Tablet";
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Opera Mini/i.test(ua)) {
                return /iPhone|iPod/i.test(ua) ? "iPhone" : "Android Mobile";
            }
            return "PC";
        }

        const dbRequest = indexedDB.open("RaceLoggerDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };
        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            updateSyncStatusLabel();
            loadSettingsState();
            loadHistory();
            attemptSync();
        };

        function toggleSettings() {
            const modal = document.getElementById("settingsModal");
            document.getElementById("syncUrlInput").value = syncUrl;
            modal.classList.toggle("hidden");
        }

        function saveSettings() {
            const inputVal = document.getElementById("syncUrlInput").value.trim();
            const newUrl = inputVal || DEFAULT_SYNC_URL;
            localStorage.setItem("syncUrl", newUrl);
            syncUrl = newUrl;
            toggleSettings();
            updateSyncStatusLabel();
            attemptSync();
        }

        function updateSyncStatusLabel() {
            const status = document.getElementById("syncStatus");
            status.textContent = !syncUrl ? "Offline Mode" : "Auto-Sync Enabled";
            status.className = !syncUrl ? "text-[10px] bg-yellow-500 text-yellow-950 px-2 py-0.5 rounded-full font-bold" : "text-[10px] bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold";
        }

        function toggleLock() {
            isSetupLocked = !isSetupLocked;
            localStorage.setItem("settingsLocked", isSetupLocked);
            applyLockState();
        }

        function applyLockState() {
            const cpInput = document.getElementById("checkpoint");
            const volInput = document.getElementById("volunteer");
            const lockBtn = document.getElementById("lockBtn");
            const setupFields = document.getElementById("setupFields");
            const setupSummary = document.getElementById("setupSummary");
            const setupHeaderRow = document.getElementById("setupHeaderRow");

            cpInput.disabled = isSetupLocked;
            volInput.disabled = isSetupLocked;

            const cpVal = cpInput.value.toUpperCase().trim() || 'N/A';
            const volVal = volInput.value.toUpperCase().trim() || 'N/A';

            if (isSetupLocked) {
                lockBtn.textContent = "🔒 Settings Locked";
                lockBtn.className = "text-xs bg-emerald-600 hover:bg-emerald-500 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                localStorage.setItem("checkpointVal", cpVal);
                localStorage.setItem("volunteerVal", volVal);
                setupFields.classList.add("hidden"); 
                setupHeaderRow.classList.replace("mb-3", "mb-0"); 
                setupSummary.textContent = `${cpVal} • ${volVal}`; 
                setupSummary.classList.remove("hidden"); 
            } else {
                lockBtn.textContent = "🔓 Unlock Settings";
                lockBtn.className = "text-xs bg-gray-700 hover:bg-gray-600 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                setupFields.classList.remove("hidden"); 
                setupHeaderRow.classList.replace("mb-0", "mb-3"); 
                setupSummary.classList.add("hidden"); 
            }
        }

        function loadSettingsState() {
            isSetupLocked = localStorage.getItem("settingsLocked") === "true";
            document.getElementById("checkpoint").value = localStorage.getItem("checkpointVal") || "";
            document.getElementById("volunteer").value = localStorage.getItem("volunteerVal") || "";
            applyLockState();
        }

        function triggerInlineToast(bib, statusText, remarkText = "", isError = false) {
            const remarkInput = document.getElementById('remarkInput');
            const remarkLabel = document.getElementById('remarkLabel');
            clearTimeout(inlineToastTimeout);

            let displayText = isError ? `⚠️ Bib ${bib}: ${statusText}` : `✅ Bib ${bib}: ${statusText}`;
            if (remarkText) displayText += ` (${remarkText})`;

            remarkInput.value = displayText;
            remarkInput.disabled = true;
            
            if (isError) {
                remarkInput.className = "w-full bg-red-950 border-red-500 text-red-300 rounded-lg px-3 py-2 text-sm font-bold text-center";
                remarkLabel.className = "block text-xs text-red-400 mb-1 font-bold";
                remarkLabel.textContent = "Status Alert";
            } else {
                remarkInput.className = "w-full bg-emerald-950 border-emerald-500 text-emerald-300 rounded-lg px-3 py-2 text-sm font-bold text-center";
                remarkLabel.className = "block text-xs text-emerald-400 mb-1 font-bold";
                remarkLabel.textContent = "Last Action Status";
            }

            inlineToastTimeout = setTimeout(() => { clearInlineToast(); }, 4000);
        }

        function clearInlineToast() {
            const remarkInput = document.getElementById('remarkInput');
            const remarkLabel = document.getElementById('remarkLabel');
            clearTimeout(inlineToastTimeout);
            remarkInput.disabled = false;
            remarkInput.value = "";
            remarkInput.placeholder = "e.g. Missed helper, penalty, etc.";
            remarkInput.className = "w-full bg-gray-700 border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500";
            remarkLabel.className = "block text-xs text-gray-400 mb-1 font-semibold";
            remarkLabel.textContent = "Remark (Optional)";
        }

        function checkDuplicateAndLog() {
            const bibInput = document.getElementById('bibInput');
            const bib = bibInput.value.trim();
            if (!bib) return;

            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const now = new Date();
                const duplicate = logs.find(log => log.bib === bib && (now - new Date(log.time)) < 600000);

                if (duplicate && !confirm(`⚠️ Bib ${bib} was logged recently. Log again?`)) {
                    bibInput.value = '';
                    bibInput.focus();
                } else {
                    logEntry(bib);
                }
            };
        }

        function logEntry(bib) {
            const bibInput = document.getElementById('bibInput');
            const remarkInput = document.getElementById('remarkInput');
            const checkpoint = document.getElementById('checkpoint').value.trim() || 'Unknown';
            const volunteer = document.getElementById('volunteer').value.trim() || 'Unknown';
            const remark = remarkInput.disabled ? "" : remarkInput.value.trim();

            const now = new Date();
            const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const entry = {
                bib: bib,
                time: timestampStr,
                volunteer: volunteer.toUpperCase(),
                checkpoint: checkpoint.toUpperCase(),
                remark: remark,
                device: getDeviceType(),
                latitude: null,
                longitude: null,
                synced: false
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { entry.latitude = pos.coords.latitude; entry.longitude = pos.coords.longitude; saveToDB(entry); },
                    () => { saveToDB(entry); },
                    { timeout: 2000 }
                );
            } else {
                saveToDB(entry);
            }

            bibInput.value = '';
            bibInput.focus();
        }

        function saveToDB(entry) {
            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            const request = store.add(entry);

            request.onsuccess = function(e) {
                entry.id = e.target.result;
                loadHistory();
                triggerInlineToast(entry.bib, "Saved Locally!", entry.remark, false);
                if (navigator.vibrate) navigator.vibrate(50);
                if (syncUrl) syncSingleRow(entry);
            };
        }

        function syncSingleRow(row) {
            if (!syncUrl || row.synced) return;

            fetch(syncUrl, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(row)
            })
            .then(async res => {
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { 
                    throw new Error("Invalid response structural type from Google Script: " + text);
                }
                
                if (data.status === "success") {
                    row.synced = true;
                    const transaction = db.transaction(["logs"], "readwrite");
                    const store = transaction.objectStore("logs");
                    store.put(row);
                    transaction.oncomplete = function() { loadHistory(); };
                } else {
                    throw new Error(data.message || "Script execution error.");
                }
            })
            .catch(err => {
                console.error("Sync Failure Details:", err);
                // Alert visually so the volunteer knows what Google says
                alert(`Sync Failed for Bib ${row.bib}.\nError: ${err.message}\nCheck your Google script permissions status!`);
            });
        }

        function attemptSync() {
            if (!syncUrl) return;
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();
            request.onsuccess = function() {
                request.result.forEach(log => { if (!log.synced) syncSingleRow(log); });
            };
        }

        window.addEventListener('online', attemptSync);

        function loadHistory() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
                
                document.getElementById('totalCount').textContent = logs.length;
                document.getElementById('uniqueCount').textContent = new Set(logs.map(l => l.bib)).size;

                const frequencies = {};
                logs.forEach(l => frequencies[l.bib] = (frequencies[l.bib] || 0) + 1);

                const logList = document.getElementById('logList');
                logList.innerHTML = '';

                [...logs].reverse().filter(log => {
                    return log.bib.toLowerCase().includes(searchQuery) || 
                           log.checkpoint.toLowerCase().includes(searchQuery) || 
                           log.volunteer.toLowerCase().includes(searchQuery);
                }).forEach(log => {
                    const row = document.createElement('div');
                    row.className = 'px-4 py-3 flex justify-between items-center hover:bg-gray-700/30';
                    const remarkHTML = log.remark ? `<div class="text-[11px] text-yellow-300 italic mt-0.5">💬 ${log.remark}</div>` : '';
                    const freqBadge = frequencies[log.bib] > 1 ? `<span class="text-[10px] bg-indigo-600/60 text-indigo-200 px-1.5 py-0.5 rounded font-bold">${frequencies[log.bib]}x</span>` : '';

                    row.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <span class="text-xl font-black text-yellow-400">${log.bib}</span>
                                ${freqBadge}
                                <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 font-bold tracking-wide">${log.checkpoint}</span>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-0.5">${log.time} • By: ${log.volunteer}</div>
                            ${remarkHTML}
                        </div>
                        <div class="text-right flex items-center gap-3 shrink-0">
                            <div class="flex flex-col items-end gap-1">
                                <span class="text-[10px] ${log.synced ? 'text-emerald-400 font-bold' : 'text-yellow-500 font-bold'}">${log.synced ? '✅ Synced' : '⏳ Queued'}</span>
                            </div>
                            <button onclick="deleteRow(${log.id}, '${log.bib}', '${log.time}')" class="text-red-500 hover:text-red-400 p-1 text-base">🗑️</button>
                        </div>
                    `;
                    logList.appendChild(row);
                });
            };
        }

        function deleteRow(id, bib, time) {
            if (!confirm(`Delete entry for Bib ${bib}?`)) return;
            if (syncUrl) {
                fetch(syncUrl, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "delete", bib: bib, time: time })
                }).catch(err => console.error(err));
            }
            const transaction = db.transaction(["logs"], "readwrite");
            transaction.objectStore("logs").delete(id);
            transaction.oncomplete = function() { loadHistory(); };
        }

        function exportCSV() {
            const transaction = db.transaction(["logs"], "readonly");
            const request = transaction.objectStore("logs").getAll();
            request.onsuccess = function() {
                if (request.result.length === 0) return;
                let csv = "data:text/csv;charset=utf-8,ID,Bib,Time,Checkpoint,Volunteer,Remark,Device\n";
                request.result.forEach(l => { csv += `${l.id},"${l.bib}","${l.time}","${l.checkpoint}","${l.volunteer}","${l.remark || ''}","${l.device}"\n`; });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", `Race_Logs_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        function clearDatabase() {
            if (!confirm("Erase all local entries?")) return;
            const transaction = db.transaction(["logs"], "readwrite");
            transaction.objectStore("logs").clear();
            transaction.oncomplete = function() { loadHistory(); };
        }

        document.getElementById('bibInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkDuplicateAndLog(); });
        document.getElementById('remarkInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkDuplicateAndLog(); });
    </script>
</body>
</html>
