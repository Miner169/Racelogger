<script>const DEFAULT_SYNC_URL = "https://script.google.com/macros/s/AKfycbzQQE7TLzm1muiHhBDrtenUZye0I8Yb2U3tNwq_3PsmtmvoddbeL11Kzm4P2RXqbCF_Ig/exec";</script>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Race Bib Logger</title>
    <link class="theme-manifest" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #000000;         
            --panel-bg: #0a0a0a;         
            --text-main: #e5e5e5;        
            --text-muted: #8e8e93;       
            --border-color: #262626;     
            --input-bg: #000000;         
            --input-text: #ffffff;
            --input-placeholder: #555555;
            --header-bg: #0c1a30;        
            --header-border: #172554;
            --header-text: #60a5fa;
            --btn-lock-bg: #171717;
            --btn-lock-text: #d4d4d4;
            --btn-lock-border: #262626;
            --bib-color: #10b981;        
            --bib-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        }

        body.light-theme {
            --bg-color: #d8d8dc;         
            --panel-bg: #eaeaea;         
            --text-main: #000000;        
            --text-muted: #333333;       
            --border-color: #a8a8af;     
            --input-bg: #ebebef;         
            --input-text: #000000;       
            --input-placeholder: #555555; 
            --header-bg: #1e2e42;        
            --header-border: #2d3d52;
            --header-text: #93c5fd;      
            --btn-lock-bg: #dbdbdf;
            --btn-lock-text: #000000;
            --btn-lock-border: #92929a;
            --bib-color: #065f46;        
            --bib-shadow: 1px 1px 0px #ffffff, -1px -1px 0px #ffffff, 1px -1px 0px #ffffff, -1px 1px 0px #ffffff;
        }

        .theme-bg { background-color: var(--bg-color); transition: background-color 0.15s ease; }
        .theme-panel { background-color: var(--panel-bg); border-color: var(--border-color); transition: all 0.15s ease; }
        .theme-text { color: var(--text-main); }
        .theme-text-muted { color: var(--text-muted); }
        .theme-border { border-color: var(--border-color); }
        
        .bib-text-highlight { color: var(--bib-color); text-shadow: var(--bib-shadow); font-weight: 900; }
        .theme-input { background-color: var(--input-bg); border-color: var(--border-color); color: var(--input-text); }
        .theme-input::placeholder { color: var(--input-placeholder); opacity: 1; }
        .theme-header { background-color: var(--header-bg); border-color: var(--header-border); }
        .theme-header-text { color: var(--header-text); }
        .theme-btn-lock { background-color: var(--btn-lock-bg); border-color: var(--btn-lock-border); color: var(--btn-lock-text); }

        html, body { overscroll-behavior-y: contain; }
        @keyframes popScale {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .animate-pop-scale { animation: popScale 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="theme-bg theme-text min-h-screen flex flex-col font-sans select-none pb-16">

    <!-- Header Status Bar -->
    <header class="theme-header border-b px-4 py-2 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2.5">
            <h1 class="text-sm font-black tracking-wider theme-header-text">RACE LOG</h1>
            <span id="syncStatus" class="text-[9px] bg-emerald-950 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded-full font-bold">Auto-Sync</span>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="text-gray-300 hover:text-white p-1">☀️</button>
    </header>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="theme-panel p-6 rounded-2xl border w-full max-w-md max-h-[85vh] overflow-y-auto shadow-2xl flex flex-col gap-4">
            <h3 class="text-lg font-bold mb-1 theme-text">⚙️ Settings</h3>
            
            <div>
                <label class="block text-xs theme-text-muted mb-1 font-bold">Google Apps Script Web App URL</label>
                <input type="text" id="syncUrlInput" class="w-full theme-input border rounded-lg px-3 py-2 text-sm">
            </div>

            <hr class="theme-border">

            <div>
                <h4 class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">🔊 Hardware Alerts</h4>
                <div class="flex flex-col gap-2.5 text-xs">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="vibrateToggle" class="w-4 h-4">
                        <span class="theme-text">Vibration on Success</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="soundToggle" class="w-4 h-4">
                        <span class="theme-text">Audio Chime on Success</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-xs theme-text-muted mb-1 font-bold">Local History Limit</label>
                <select id="historyLimitSelect" class="w-full theme-input border rounded-lg px-2 py-1.5 text-xs">
                    <option value="20">Show Latest 20 Logs</option>
                    <option value="50">Show Latest 50 Logs</option>
                    <option value="all">Show All Logs</option>
                </select>
            </div>

            <div class="flex gap-2 justify-end border-t theme-border pt-3 mt-1">
                <button onclick="toggleSettings()" class="bg-neutral-800 text-white px-4 py-2 rounded-lg text-sm">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-800 text-white px-4 py-2 rounded-lg text-sm">Save</button>
            </div>
        </div>
    </div>

    <main class="flex-grow p-3 max-w-md mx-auto w-full flex flex-col gap-3">
        
        <!-- Checkpoint Setup Panel -->
        <section id="setupSection" class="theme-panel p-3 rounded-xl border shadow flex flex-col gap-2">
            <div id="setupHeaderRow" class="flex justify-between items-center">
                <h2 class="text-xs font-bold theme-text-muted uppercase flex items-center gap-2">
                    <span>1. Setup</span>
                    <span id="setupSummary" class="hidden bg-emerald-950 text-emerald-400 border border-emerald-800 px-2 rounded font-bold uppercase text-[10px]"></span>
                </h2>
                <button onclick="toggleLock()" id="lockBtn" class="text-[10px] theme-btn-lock border px-2 py-0.5 rounded font-bold">🔓 Unlock</button>
            </div>

            <div id="setupFields" class="grid grid-cols-2 gap-2">
                <input type="text" id="checkpoint" placeholder="Checkpoint" oninput="validateSetup()" class="w-full theme-input border rounded-lg px-2 py-1.5 text-xs uppercase font-bold">
                <input type="text" id="volunteer" placeholder="Volunteer" oninput="validateSetup()" class="w-full theme-input border rounded-lg px-2 py-1.5 text-xs uppercase font-bold">
            </div>
        </section>

        <!-- Fast Entry Log Form -->
        <section class="theme-panel p-3 rounded-xl border shadow flex flex-col gap-2">
            <h2 class="text-[10px] font-bold theme-text-muted uppercase tracking-wider">2. Enter Bib</h2>
            <div class="flex gap-2 items-stretch">
                <input type="text" id="bibInput" inputmode="numeric" placeholder="Enter Bib" class="w-full h-12 theme-input text-center text-2xl font-black border-2 rounded-xl focus:outline-none focus:border-blue-700">
                <button id="logBtn" disabled onclick="checkDuplicateAndLog()" class="bg-blue-800 disabled:bg-neutral-800 disabled:text-neutral-500 text-white font-black px-6 rounded-xl shadow-lg transition">LOG</button>
            </div>
        </section>

        <!-- Scan History -->
        <section class="flex-grow theme-panel rounded-xl border shadow flex flex-col overflow-hidden min-h-[200px]">
            <div class="px-3 py-2 border-b theme-border flex justify-between items-center">
                <h3 class="text-xs font-bold theme-text-muted uppercase">History</h3>
                <button onclick="toggleSettings()" class="text-xs text-blue-500">⚙️</button>
            </div>
            <div id="logList" class="overflow-y-auto flex-grow divide-y theme-border text-xs"></div>
        </section>
    </main>

    <div id="successToast" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[100] bg-black/90 border border-emerald-500 rounded-2xl px-8 py-6 shadow-2xl flex flex-col items-center">
        <span class="text-4xl">✅</span>
    </div>

    <script>
        let db, isSetupLocked = false;
        
        function validateSetup() {
            const cp = document.getElementById('checkpoint').value.trim();
            const vol = document.getElementById('volunteer').value.trim();
            const logBtn = document.getElementById('logBtn');
            logBtn.disabled = !(cp && vol);
        }

        function loadSettingsState() { 
            // Default to true/20 if not set
            const storedSound = localStorage.getItem("soundEnabled");
            const storedHistory = localStorage.getItem("historyLimit");
            
            document.getElementById("soundToggle").checked = storedSound !== "false";
            document.getElementById("historyLimitSelect").value = storedHistory || "20";
            document.getElementById("vibrateToggle").checked = localStorage.getItem("vibrateEnabled") !== "false";
            
            document.getElementById("checkpoint").value = localStorage.getItem("checkpointVal") || "";
            document.getElementById("volunteer").value = localStorage.getItem("volunteerVal") || "";
            isSetupLocked = localStorage.getItem("settingsLocked") === "true";
            
            applyLockState();
            validateSetup();
        }

        function applyLockState() {
            const cp = document.getElementById("checkpoint"), vol = document.getElementById("volunteer"), 
                  lockBtn = document.getElementById("lockBtn"), fields = document.getElementById("setupFields"), 
                  summary = document.getElementById("setupSummary"), row = document.getElementById("setupHeaderRow");
            
            if (isSetupLocked) {
                lockBtn.textContent = "🔒 Locked";
                fields.classList.add("hidden");
                summary.textContent = `${cp.value || 'N/A'} • ${vol.value || 'N/A'}`;
                summary.classList.remove("hidden");
            } else {
                lockBtn.textContent = "🔓 Unlock";
                fields.classList.remove("hidden");
                summary.classList.add("hidden");
            }
        }

        function toggleLock() { 
            isSetupLocked = !isSetupLocked; 
            localStorage.setItem("settingsLocked", isSetupLocked); 
            localStorage.setItem("checkpointVal", document.getElementById("checkpoint").value);
            localStorage.setItem("volunteerVal", document.getElementById("volunteer").value);
            applyLockState(); 
        }

        function saveSettings() {
            localStorage.setItem("soundEnabled", document.getElementById("soundToggle").checked);
            localStorage.setItem("vibrateEnabled", document.getElementById("vibrateToggle").checked);
            localStorage.setItem("historyLimit", document.getElementById("historyLimitSelect").value);
            toggleSettings();
            loadHistory();
        }

        function toggleSettings() { document.getElementById("settingsModal").classList.toggle("hidden"); }

        // Initialize Database
        const dbRequest = indexedDB.open("RaceLoggerDB", 1);
        dbRequest.onupgradeneeded = (e) => e.target.result.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            loadSettingsState();
            loadHistory();
        };

        // Simplified log functionality for brevity in this example
        function checkDuplicateAndLog() {
            const bI = document.getElementById('bibInput');
            if(!bI.value) return;
            // ... (Your existing logging logic here)
            bI.value = '';
            loadHistory();
        }

        function loadHistory() {
            const limit = document.getElementById("historyLimitSelect").value;
            db.transaction(["logs"], "readonly").objectStore("logs").getAll().onsuccess = function(e) {
                let logs = e.target.result.reverse();
                if (limit !== 'all') logs = logs.slice(0, parseInt(limit));
                const list = document.getElementById('logList');
                list.innerHTML = logs.map(l => `<div class="p-2 border-b border-neutral-800">${l.bib} - ${l.time}</div>`).join('');
            };
        }
    </script>
</body>
</html>
