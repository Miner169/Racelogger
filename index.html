<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Bib Logger</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS for fast, responsive mobile UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans select-none">

    <!-- Header Status Bar -->
    <header class="bg-blue-600 px-4 py-3 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-extrabold tracking-wider">RACE LOG</h1>
            <span id="syncStatus" class="text-xs bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full font-bold">Offline Storage Mode</span>
        </div>
        <button onclick="installApp()" id="installBtn" class="hidden text-xs bg-white text-blue-600 px-3 py-1.5 rounded-lg font-bold shadow hover:bg-gray-100 transition">
            📲 Install App
        </button>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full flex flex-col gap-4">
        
        <!-- Checkpoint Setup Panel -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">1. Volunteer Setup</h2>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Checkpoint</label>
                    <select id="checkpoint" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Start Line">Start Line</option>
                        <option value="CP 1 (5KM)">CP 1 (5KM)</option>
                        <option value="CP 2 (10KM)">CP 2 (10KM)</option>
                        <option value="Finish Line">Finish Line</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Volunteer Initials</label>
                    <input type="text" id="volunteer" placeholder="e.g. John" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
            </div>
        </section>

        <!-- Fast Entry Log Form -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">2. Enter Bib</h2>
            <div class="flex gap-2">
                <input type="number" id="bibInput" inputmode="numeric" pattern="[0-8]*" placeholder="0" class="flex-grow bg-gray-700 text-center text-4xl font-black text-white border-2 border-gray-600 rounded-xl px-2 py-3 focus:outline-none focus:border-blue-500 transition">
                <button onclick="logEntry()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-extrabold text-lg px-6 rounded-xl shadow-lg transition duration-150 flex items-center justify-center">
                    LOG
                </button>
            </div>
        </section>

        <!-- Dynamic Live Counter -->
        <div class="flex justify-between items-center bg-gray-800/50 px-4 py-2.5 rounded-lg border border-gray-700">
            <span class="text-sm text-gray-400 font-semibold">Total Offline Logs on This Device:</span>
            <span id="totalCount" class="text-xl font-black text-blue-400">0</span>
        </div>

        <!-- Scrollable Scan History -->
        <section class="flex-grow bg-gray-800 rounded-xl border border-gray-700 shadow flex flex-col overflow-hidden min-h-[200px]">
            <div class="px-4 py-3 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Local Scan History</h3>
                <button onclick="clearDatabase()" class="text-xs text-red-400 hover:text-red-300 font-bold">Clear Logs</button>
            </div>
            <div id="logList" class="overflow-y-auto flex-grow divide-y divide-gray-700 max-h-[300px]">
                <!-- Dynamic Logs go here -->
            </div>
        </section>

        <!-- Export & Share Section -->
        <section class="flex flex-col gap-2">
            <button onclick="exportCSV()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-black py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2">
                📥 Export & Download CSV
            </button>
            <p class="text-[10px] text-gray-500 text-center">Data is stored securely on your browser's local sandbox. Exporting saves a clean file ready to be copied into Google Sheets.</p>
        </section>

    </main>

    <script>
        let db;
        let deferredPrompt;

        // --- 1. INDEXEDDB SETUP (Browser Offline Database) ---
        const dbRequest = indexedDB.open("RaceLoggerDB", 1);

        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };

        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            loadHistory();
        };

        dbRequest.onerror = function() {
            alert("Database failed to load. Please allow local storage.");
        };

        // --- 2. LOG ENTRY HANDLING ---
        function logEntry() {
            const bibInput = document.getElementById('bibInput');
            const checkpoint = document.getElementById('checkpoint').value;
            const volunteer = document.getElementById('volunteer').value.trim() || 'Unknown';
            const bib = bibInput.value.trim();

            if (!bib) {
                alert("Please enter a valid Bib Number.");
                return;
            }

            // Capture exact offline client timestamp & coordinates
            const now = new Date();
            const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const entry = {
                bib: bib,
                time: timestampStr,
                volunteer: volunteer.toUpperCase(),
                checkpoint: checkpoint,
                latitude: null,
                longitude: null
            };

            // Attempt to capture GPS Coordinates offline
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        entry.latitude = position.coords.latitude;
                        entry.longitude = position.coords.longitude;
                        saveToDB(entry);
                    },
                    () => {
                        // fallback if GPS blocked/unavailable
                        saveToDB(entry);
                    },
                    { timeout: 3000 }
                );
            } else {
                saveToDB(entry);
            }

            // Clear input box and return cursor focus for fast double entries
            bibInput.value = '';
            bibInput.focus();
        }

        function saveToDB(entry) {
            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            store.add(entry);

            transaction.oncomplete = function() {
                loadHistory();
                // haptic feedback for success (works on supported devices)
                if (navigator.vibrate) navigator.vibrate(50);
            };
        }

        // --- 3. DISPLAY HISTORIC DATA ---
        function loadHistory() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result.reverse(); // Newest first
                const logList = document.getElementById('logList');
                const totalCount = document.getElementById('totalCount');
                
                totalCount.textContent = logs.length;
                logList.innerHTML = '';

                logs.forEach(log => {
                    const row = document.createElement('div');
                    row.className = 'px-4 py-3 flex justify-between items-center hover:bg-gray-700/30';
                    row.innerHTML = `
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-xl font-black text-yellow-400">${log.bib}</span>
                                <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 font-bold">${log.checkpoint}</span>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-0.5">${log.time} • By: ${log.volunteer}</div>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-gray-500 block">${log.latitude ? '📍 GPS Saved' : '⚠️ No GPS'}</span>
                        </div>
                    `;
                    logList.appendChild(row);
                });
            };
        }

        // --- 4. EXPORT LOCAL DATABASE TO CSV ---
        function exportCSV() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                if (logs.length === 0) {
                    alert("No local records found to export.");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "ID,Bib,Time,Checkpoint,Recorded By,Latitude,Longitude\n";

                logs.forEach(log => {
                    csvContent += `${log.id},"${log.bib}","${log.time}","${log.checkpoint}","${log.volunteer}","${log.latitude || ''}","${log.longitude || ''}"\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                
                const nowStr = new Date().toISOString().split('T')[0];
                link.setAttribute("download", `Race_Logs_${nowStr}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        // --- 5. CLEANUP HANDLER ---
        function clearDatabase() {
            if (confirm("Are you absolutely sure you want to erase all logged bibs on this device? Make sure you exported them to a CSV first!")) {
                const transaction = db.transaction(["logs"], "readwrite");
                const store = transaction.objectStore("logs");
                const request = store.clear();
                request.onsuccess = function() {
                    loadHistory();
                };
            }
        }

        // Keyboard "Enter" key submits form automatically
        document.getElementById('bibInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                logEntry();
            }
        });

        // --- 6. PWA INSTALLATION INTERFACE ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBtn').classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        }
    </script>

    <!-- Dynamic Service Worker Setup script -->
    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'race-logger-v1';
                const ASSETS = [
                    '/',
                    '/index.html',
                    '/manifest.json'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(ASSETS);
                        })
                    );
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((cachedResponse) => {
                            return cachedResponse || fetch(e.request);
                        })
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl)
                .then(() => console.log("Offline Service Worker Registered successfully!"))
                .catch(err => console.log("Service Worker Registration Failed", err));
        }
    </script>
</body>
</html>
