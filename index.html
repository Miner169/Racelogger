<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Bib Logger</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans select-none pb-16">

    <!-- Header Status Bar with Settings Gear -->
    <header class="bg-blue-600 px-4 py-3 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-extrabold tracking-wider">RACE LOG</h1>
            <span id="syncStatus" class="text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold">Auto-Sync Enabled</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleSettings()" class="text-white hover:text-gray-200 text-xl p-1" title="Settings">
                ⚙️
            </button>
            <button onclick="installApp()" id="installBtn" class="hidden text-xs bg-white text-blue-600 px-3 py-1.5 rounded-lg font-bold shadow hover:bg-gray-100 transition">
                📲 Install App
            </button>
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4">⚙️ App Settings</h3>
            <label class="block text-xs text-gray-400 mb-1 font-semibold">Google Apps Script Web App URL</label>
            <input type="text" id="syncUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            <div class="flex gap-2 justify-end">
                <button onclick="toggleSettings()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold">Save URL</button>
            </div>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-md mx-auto w-full flex flex-col gap-4">
        
        <!-- Checkpoint Setup Panel (With Lock & Minimize Feature) -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow transition-all duration-300">
            <div id="setupHeaderRow" class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <span>1. Setup</span>
                    <!-- Dynamic Collapsed Badge -->
                    <span id="setupSummary" class="hidden text-[11px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded font-mono font-bold uppercase"></span>
                </h2>
                <button onclick="toggleLock()" id="lockBtn" class="text-xs bg-gray-700 hover:bg-gray-600 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1">
                    🔓 Unlock Settings
                </button>
            </div>
            <!-- Collapsible Inputs Container -->
            <div id="setupFields" class="grid grid-cols-2 gap-3 transition-all duration-300">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Checkpoint Name</label>
                    <input type="text" id="checkpoint" placeholder="e.g. CP 1" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 font-semibold">Volunteer Initials</label>
                    <input type="text" id="volunteer" placeholder="e.g. John" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
            </div>
        </section>

        <!-- Fast Entry Log Form -->
        <section class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">2. Enter Bib</h2>
            
            <div class="flex gap-3 items-stretch">
                <div class="flex-grow">
                    <input type="tel" id="bibInput" inputmode="numeric" pattern="[0-9]*" placeholder="0" class="w-full h-16 bg-gray-700 text-center text-4xl font-black text-white border-2 border-gray-600 rounded-xl px-2 focus:outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="checkDuplicateAndLog()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-extrabold text-lg px-6 rounded-xl shadow-lg transition duration-150 flex items-center justify-center">
                    LOG
                </button>
            </div>

            <div class="mt-1">
                <label class="block text-xs text-gray-400 mb-1 font-semibold">Remark (Optional)</label>
                <input type="text" id="remarkInput" placeholder="e.g. Missed helper, penalty, etc." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </section>

        <!-- Advanced Counter Statistics Panel -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700 text-center">
                <div class="text-xs text-gray-400 font-semibold mb-1">Total Logs</div>
                <div id="totalCount" class="text-2xl font-black text-blue-400">0</div>
            </div>
            <div class="bg-gray-800/50 p-3 rounded-lg border border-gray-700 text-center">
                <div class="text-xs text-gray-400 font-semibold mb-1">Unique Runners</div>
                <div id="uniqueCount" class="text-2xl font-black text-indigo-400">0</div>
            </div>
        </div>

        <!-- Scrollable Scan History with Local Filter Search -->
        <section class="flex-grow bg-gray-800 rounded-xl border border-gray-700 shadow flex flex-col overflow-hidden min-h-[200px]">
            <div class="px-4 py-3 border-b border-gray-700 flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">Local Scan History</h3>
                    <button onclick="clearDatabase()" class="text-xs text-red-400 hover:text-red-300 font-bold">Clear All</button>
                </div>
                <!-- Local Search Bar -->
                <div class="relative">
                    <input type="text" id="searchBar" oninput="loadHistory()" placeholder="🔍 Filter by Bib, Checkpoint, or Name..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-xs text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </div>
            <div id="logList" class="overflow-y-auto flex-grow divide-y divide-gray-700 max-h-[300px]">
                <!-- Dynamic Logs go here -->
            </div>
        </section>

        <!-- Export & Share Section -->
        <section class="flex flex-col gap-2">
            <button onclick="exportCSV()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-black py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2">
                📥 Export & Download CSV
            </button>
            <p class="text-[10px] text-gray-500 text-center">Data is stored securely on your browser's local sandbox. Exporting saves a clean file ready to be copied into Google Sheets.</p>
        </section>

    </main>

    <!-- Floating Confirmation Toast (Fixed at the bottom, away from the Log button) -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl font-black text-sm z-50 flex items-center gap-2 transition-all duration-300 transform scale-90 opacity-0">
        <span id="toastIcon">✅</span>
        <span id="toastText">Bib Logged Status</span>
    </div>

    <script>
        let db;
        let deferredPrompt;
        let isSetupLocked = false;
        let toastTimeout;
        
        // --- HARDCODED GOOGLE SCRIPT URL ---
        const DEFAULT_SYNC_URL = "https://script.google.com/macros/s/AKfycbweiZ7rijKmR-D-gwG9SMDTj_ehesBP_85hqAWipzVpGjFMk4d2MTZh2FUQZfpMqy7Kiw/exec";
        let syncUrl = localStorage.getItem("syncUrl") || DEFAULT_SYNC_URL;

        // --- 1. DEVICE DETECTOR ---
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/tablet|ipad|playbook|silk/i.test(ua)) return "Tablet";
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Opera Mini/i.test(ua)) {
                return /iPhone|iPod/i.test(ua) ? "iPhone" : "Android Mobile";
            }
            if (/Windows/i.test(ua)) return "Windows PC";
            if (/Macintosh/i.test(ua)) return "Mac PC";
            if (/Linux/i.test(ua)) return "Linux PC";
            return "Unknown Device";
        }

        // --- 2. INDEXEDDB SETUP ---
        const dbRequest = indexedDB.open("RaceLoggerDB", 1);

        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };

        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            updateSyncStatusLabel();
            loadSettingsState();
            loadHistory();
            attemptSync();
        };

        dbRequest.onerror = function() {
            alert("Database failed to load.");
        };

        // --- 3. SETTINGS & COLLAPSIBLE LOCK PANEL LOGIC ---
        function toggleSettings() {
            const modal = document.getElementById("settingsModal");
            document.getElementById("syncUrlInput").value = syncUrl;
            modal.classList.toggle("hidden");
        }

        function saveSettings() {
            const inputVal = document.getElementById("syncUrlInput").value.trim();
            const newUrl = inputVal || DEFAULT_SYNC_URL;
            localStorage.setItem("syncUrl", newUrl);
            syncUrl = newUrl;
            toggleSettings();
            updateSyncStatusLabel();
            attemptSync();
        }

        function updateSyncStatusLabel() {
            const status = document.getElementById("syncStatus");
            if (!syncUrl) {
                status.textContent = "Offline Storage Mode (No Sync URL)";
                status.className = "text-xs bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded-full font-bold";
            } else {
                status.textContent = "Auto-Sync Enabled";
                status.className = "text-xs bg-emerald-500 text-white px-2 py-0.5 rounded-full font-bold";
            }
        }

        function toggleLock() {
            isSetupLocked = !isSetupLocked;
            localStorage.setItem("settingsLocked", isSetupLocked);
            applyLockState();
        }

        function applyLockState() {
            const cpInput = document.getElementById("checkpoint");
            const volInput = document.getElementById("volunteer");
            const lockBtn = document.getElementById("lockBtn");
            const setupFields = document.getElementById("setupFields");
            const setupSummary = document.getElementById("setupSummary");
            const setupHeaderRow = document.getElementById("setupHeaderRow");

            cpInput.disabled = isSetupLocked;
            volInput.disabled = isSetupLocked;

            const cpVal = cpInput.value.toUpperCase().trim() || 'N/A';
            const volVal = volInput.value.toUpperCase().trim() || 'N/A';

            if (isSetupLocked) {
                lockBtn.textContent = "🔒 Settings Locked";
                lockBtn.className = "text-xs bg-emerald-600 hover:bg-emerald-500 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                localStorage.setItem("checkpointVal", cpVal);
                localStorage.setItem("volunteerVal", volVal);

                // --- MINIMIZE CODE ---
                setupFields.classList.add("hidden"); // Collapse the input grid
                setupHeaderRow.classList.replace("mb-3", "mb-0"); // Shave off margin
                setupSummary.textContent = `${cpVal} • ${volVal}`; // Insert variables into the badge
                setupSummary.classList.remove("hidden"); // Reveal badge
            } else {
                lockBtn.textContent = "🔓 Unlock Settings";
                lockBtn.className = "text-xs bg-gray-700 hover:bg-gray-600 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                
                // --- RESTORE CODE ---
                setupFields.classList.remove("hidden"); // Expand the input grid
                setupHeaderRow.classList.replace("mb-0", "mb-3"); // Restore margin
                setupSummary.classList.add("hidden"); // Hide the badge
            }
        }

        function loadSettingsState() {
            isSetupLocked = localStorage.getItem("settingsLocked") === "true";
            document.getElementById("checkpoint").value = localStorage.getItem("checkpointVal") || "";
            document.getElementById("volunteer").value = localStorage.getItem("volunteerVal") || "";
            applyLockState();
        }

        // --- 4. INSTANT CONFIRMATION TOAST (1 SECOND) ---
        function triggerToast(bib, message, isError = false) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            const toastIcon = document.getElementById('toastIcon');

            clearTimeout(toastTimeout);

            toastText.textContent = `Bib ${bib}: ${message}`;
            
            if (isError) {
                toastIcon.textContent = "⚠️";
                toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-3 rounded-xl shadow-2xl font-black text-sm z-50 flex items-center gap-2 transition-all duration-300 transform scale-100 opacity-100";
            } else {
                toastIcon.textContent = "✅";
                toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl font-black text-sm z-50 flex items-center gap-2 transition-all duration-300 transform scale-100 opacity-100";
            }

            toast.classList.remove('hidden');

            toastTimeout = setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('scale-100', 'scale-90');
                
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 300);
            }, 1000);
        }

        // --- 5. DUPLICATE CHECK & LOG ENTRY HANDLING ---
        function checkDuplicateAndLog() {
            const bibInput = document.getElementById('bibInput');
            const bib = bibInput.value.trim();

            if (!bib) {
                alert("Please enter a valid Bib Number.");
                return;
            }

            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const now = new Date();
                const tenMinutesInMs = 10 * 60 * 1000;

                const duplicate = logs.find(log => {
                    if (log.bib === bib) {
                        const logTime = new Date(log.time);
                        return (now - logTime) < tenMinutesInMs;
                    }
                    return false;
                });

                if (duplicate) {
                    if (confirm(`⚠️ Warning: Bib ${bib} was already logged recently (${duplicate.time}).\n\nLog this new entry anyway?`)) {
                        logEntry(bib);
                    } else {
                        bibInput.value = '';
                        document.getElementById('remarkInput').value = '';
                        bibInput.focus();
                    }
                } else {
                    logEntry(bib);
                }
            };
        }

        function logEntry(bib) {
            const bibInput = document.getElementById('bibInput');
            const remarkInput = document.getElementById('remarkInput');
            const checkpointInput = document.getElementById('checkpoint');
            const volunteerInput = document.getElementById('volunteer');
            
            const checkpoint = checkpointInput.value.trim() || 'Unknown';
            const volunteer = volunteerInput.value.trim() || 'Unknown';
            const remark = remarkInput.value.trim() || "";
            const deviceType = getDeviceType();

            const now = new Date();
            const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const entry = {
                bib: bib,
                time: timestampStr,
                volunteer: volunteer.toUpperCase(),
                checkpoint: checkpoint.toUpperCase(),
                remark: remark,
                device: deviceType,
                latitude: null,
                longitude: null,
                synced: false
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        entry.latitude = position.coords.latitude;
                        entry.longitude = position.coords.longitude;
                        saveToDB(entry);
                    },
                    () => {
                        saveToDB(entry);
                    },
                    { timeout: 3000 }
                );
            } else {
                saveToDB(entry);
            }

            bibInput.value = '';
            remarkInput.value = '';
            bibInput.focus();
        }

        function saveToDB(entry) {
            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            const request = store.add(entry);

            request.onsuccess = function(e) {
                entry.id = e.target.result;
                loadHistory();
                
                triggerToast(entry.bib, "Logged Locally!");

                if (navigator.vibrate) navigator.vibrate(50);
                
                if (syncUrl) {
                    syncSingleRow(entry);
                }
            };
        }

        // --- 6. AUTO-SYNC LOGIC ---
        function syncSingleRow(row) {
            if (!syncUrl || row.synced) return;

            fetch(syncUrl, {
                method: "POST",
                mode: "cors",
                headers: {
                    "Content-Type": "text/plain"
                },
                body: JSON.stringify(row)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    row.synced = true;
                    const transaction = db.transaction(["logs"], "readwrite");
                    const store = transaction.objectStore("logs");
                    store.put(row);
                    transaction.oncomplete = function() {
                        loadHistory();
                    };
                }
            })
            .catch(err => console.log("Sync failed. Queued for background transfer.", err));
        }

        function attemptSync() {
            if (!syncUrl) return;

            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                logs.forEach(log => {
                    if (!log.synced) {
                        syncSingleRow(log);
                    }
                });
            };
        }

        window.addEventListener('online', attemptSync);

        // --- 7. DISPLAY HISTORIC DATA, DELETE HANDLER, & SEARCH ---
        function loadHistory() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
                
                const totalCountVal = logs.length;
                const uniqueBibs = new Set(logs.map(log => log.bib));
                
                const frequencies = {};
                logs.forEach(log => {
                    frequencies[log.bib] = (frequencies[log.bib] || 0) + 1;
                });

                document.getElementById('totalCount').textContent = totalCountVal;
                document.getElementById('uniqueCount').textContent = uniqueBibs.size;

                const reversedLogs = [...logs].reverse();
                const filteredLogs = reversedLogs.filter(log => {
                    return log.bib.toLowerCase().includes(searchQuery) || 
                           log.checkpoint.toLowerCase().includes(searchQuery) || 
                           log.volunteer.toLowerCase().includes(searchQuery);
                });

                const logList = document.getElementById('logList');
                logList.innerHTML = '';

                filteredLogs.forEach(log => {
                    const row = document.createElement('div');
                    row.className = 'px-4 py-3 flex justify-between items-center hover:bg-gray-700/30';
                    
                    const remarkHTML = log.remark ? `<div class="text-[11px] text-yellow-300 italic mt-0.5">💬 ${log.remark}</div>` : '';
                    const deviceHTML = `<span class="text-[9px] bg-gray-800 text-gray-400 px-1 py-0.2 rounded font-mono">${log.device || 'PC'}</span>`;
                    
                    const freqCount = frequencies[log.bib] || 1;
                    const freqBadge = freqCount > 1 ? `<span class="text-[10px] bg-indigo-600/60 text-indigo-200 px-1.5 py-0.5 rounded font-bold">${freqCount}x</span>` : '';

                    row.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <span class="text-xl font-black text-yellow-400">${log.bib}</span>
                                ${freqBadge}
                                <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 font-bold tracking-wide">${log.checkpoint}</span>
                                ${deviceHTML}
                            </div>
                            <div class="text-[10px] text-gray-400 mt-0.5">${log.time} • By: ${log.volunteer}</div>
                            ${remarkHTML}
                        </div>
                        <div class="text-right flex items-center gap-3 shrink-0">
                            <div class="flex flex-col items-end gap-1">
                                <span class="text-[10px] ${log.synced ? 'text-emerald-400 font-bold' : 'text-yellow-500 font-bold'}">
                                    ${log.synced ? '✅ Synced' : '⏳ Queued'}
                                </span>
                                <span class="text-[9px] text-gray-500 block">${log.latitude ? '📍 GPS Saved' : '⚠️ No GPS'}</span>
                            </div>
                            <!-- Delete Button -->
                            <button onclick="deleteRow(${log.id}, '${log.bib}', '${log.time}')" class="text-red-500 hover:text-red-400 p-1 text-base transition" title="Delete entry">
                                🗑️
                            </button>
                        </div>
                    `;
                    logList.appendChild(row);
                });
            };
        }

        // Delete row locally & execute remote delete on Google Sheets
        function deleteRow(id, bib, time) {
            if (confirm(`Are you sure you want to delete this specific log entry (Bib: ${bib})? This action will sync to your remote spreadsheet.`)) {
                
                if (syncUrl) {
                    fetch(syncUrl, {
                        method: "POST",
                        mode: "cors",
                        headers: {
                            "Content-Type": "text/plain"
                        },
                        body: JSON.stringify({ action: "delete", bib: bib, time: time })
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log("Remote delete sync outcome: ", data.message);
                    })
                    .catch(err => console.log("Could not sync delete to server. Please delete manually from Google Sheets.", err));
                }

                const transaction = db.transaction(["logs"], "readwrite");
                const store = transaction.objectStore("logs");
                const request = store.delete(id);
                
                request.onsuccess = function() {
                    loadHistory();
                    triggerToast(bib, "Deleted!", true);
                };
            }
        }

        // --- 8. EXPORT LOCAL DATABASE TO CSV ---
        function exportCSV() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                if (logs.length === 0) {
                    alert("No local records found to export.");
                    return;
                }

                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "ID,Bib,Time,Checkpoint,Recorded By,Remark,Device,Latitude,Longitude,Synced\n";

                logs.forEach(log => {
                    csvContent += `${log.id},"${log.bib}","${log.time}","${log.checkpoint}","${log.volunteer}","${log.remark || ''}","${log.device || ''}","${log.latitude || ''}","${log.longitude || ''}","${log.synced}"\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                
                const nowStr = new Date().toISOString().split('T')[0];
                link.setAttribute("download", `Race_Logs_${nowStr}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        // --- 9. CLEANUP HANDLER ---
        function clearDatabase() {
            if (confirm("Are you absolutely sure you want to erase all logged bibs on this device? Make sure you exported them to a CSV first!")) {
                const transaction = db.transaction(["logs"], "readwrite");
                const store = transaction.objectStore("logs");
                const request = store.clear();
                request.onsuccess = function() {
                    loadHistory();
                };
            }
        }

        // Listen for enter keys
        document.getElementById('bibInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkDuplicateAndLog();
            }
        });
        
        document.getElementById('remarkInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkDuplicateAndLog();
            }
        });

        // --- 10. PWA INSTALLATION ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBtn').classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        }
    </script>

    <!-- Dynamic Service Worker Setup -->
    <script>
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'race-logger-v9';
                const ASSETS = [
                    '/',
                    '/index.html',
                    '/manifest.json'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(ASSETS);
                        })
                    );
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((cachedResponse) => {
                            return cachedResponse || fetch(e.request);
                        })
                    );
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl)
                .then(() => console.log("Service Worker Registered successfully!"))
                .catch(err => console.log("Service Worker Registration Failed", err));
        }
    </script>
</body>
