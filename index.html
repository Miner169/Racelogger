<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Bib Logger</title>
    <link class="theme-manifest" rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #000000;         /* AMOLED Black */
            --panel-bg: #0a0a0a;         /* Deepest gray */
            --text-main: #e5e5e5;        /* Light gray text */
            --text-muted: #737373;       /* Muted gray text */
            --border-color: #262626;     /* Subtle dark border */
            --input-bg: #000000;         /* Black inputs */
            --input-text: #ffffff;
            --header-bg: #0c1a30;        /* Deep blue */
            --header-border: #172554;
            --header-text: #60a5fa;
            --btn-lock-bg: #171717;
            --btn-lock-text: #d4d4d4;
            --btn-lock-border: #262626;
        }

        body.light-theme {
            --bg-color: #f3f4f6;         /* Light Gray */
            --panel-bg: #ffffff;         /* White panels */
            --text-main: #1f2937;        /* Dark gray text */
            --text-muted: #6b7280;       /* Slate muted text */
            --border-color: #e5e7eb;     /* Soft gray border */
            --input-bg: #f9fafb;         /* Off-white inputs */
            --input-text: #111827;
            --header-bg: #1e3a8a;        /* Strong Blue */
            --header-border: #1d4ed8;
            --header-text: #93c5fd;
            --btn-lock-bg: #e5e7eb;
            --btn-lock-text: #374151;
            --btn-lock-border: #d1d5db;
        }

        /* Semantic Theme Mappings */
        .theme-bg { background-color: var(--bg-color); transition: background-color 0.2s ease; }
        .theme-panel { background-color: var(--panel-bg); border-color: var(--border-color); transition: all 0.2s ease; }
        .theme-text { color: var(--text-main); }
        .theme-text-muted { color: var(--text-muted); }
        .theme-border { border-color: var(--border-color); }
        .theme-input { background-color: var(--input-bg); border-color: var(--border-color); color: var(--input-text); }
        .theme-header { background-color: var(--header-bg); border-color: var(--header-border); }
        .theme-header-text { color: var(--header-text); }
        .theme-btn-lock { background-color: var(--btn-lock-bg); border-color: var(--btn-lock-border); color: var(--btn-lock-text); }
    </style>
</head>
<body class="theme-bg theme-text min-h-screen flex flex-col font-sans select-none pb-16">

    <!-- Header Status Bar -->
    <header class="theme-header border-b px-4 py-1.5 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2.5">
            <h1 class="text-base font-black tracking-wider theme-header-text">RACE LOG</h1>
            <span id="syncStatus" class="text-[10px] bg-emerald-950 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded-full font-bold">Auto-Sync</span>
            <!-- 📡 UNSYNCED QUEUE BADGE & RETRY TRIGGER -->
            <button id="queueBadge" onclick="attemptSync()" class="hidden text-[10px] bg-yellow-950 text-yellow-400 border border-yellow-800 hover:bg-yellow-900 px-2 py-0.5 rounded-full font-bold transition flex items-center gap-1 shadow">
                <span id="queueCount">0</span> Pending 🔄
            </button>
        </div>
        <div class="flex items-center gap-1.5">
            <!-- 🗺️ GPS STATUS INDICATOR -->
            <div id="gpsIndicator" class="flex items-center gap-1 text-[10px] bg-black px-2.5 py-0.5 rounded-full font-bold border border-neutral-800 mr-1">
                <span class="w-2 h-2 rounded-full bg-red-600 animate-pulse" id="gpsDot"></span>
                <span id="gpsText" class="text-neutral-400">GPS OFF</span>
            </div>
            <!-- 🌓 THEME TOGGLE BUTTON -->
            <button onclick="toggleTheme()" id="themeBtn" class="text-gray-400 hover:text-white text-lg p-1" title="Toggle Theme">☀️</button>
            <button onclick="toggleSettings()" class="text-gray-400 hover:text-white text-lg p-1" title="Settings">⚙️</button>
            <button onclick="installApp()" id="installBtn" class="hidden text-[10px] bg-neutral-900 border border-neutral-700 text-white px-2.5 py-1 rounded-md font-bold shadow hover:bg-neutral-800 transition">📲 Install</button>
        </div>
    </header>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
        <div class="theme-panel p-6 rounded-2xl border w-full max-w-md shadow-2xl">
            <h3 class="text-lg font-bold mb-4 theme-text">⚙️ App Settings</h3>
            <label class="block text-xs theme-text-muted mb-1 font-semibold">Google Apps Script Web App URL</label>
            <input type="text" id="syncUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full theme-input border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-900 mb-4">
            <div class="flex gap-2 justify-end">
                <button onclick="toggleSettings()" class="bg-neutral-900 hover:bg-neutral-800 text-neutral-300 px-4 py-2 rounded-lg text-sm font-semibold">Cancel</button>
                <button onclick="saveSettings()" class="bg-blue-800 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">Save URL</button>
            </div>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-md mx-auto w-full flex flex-col gap-4">
        <!-- Checkpoint Setup Panel -->
        <section class="theme-panel p-4 rounded-xl border shadow transition-all duration-300">
            <div id="setupHeaderRow" class="flex justify-between items-center mb-3">
                <h2 class="text-sm font-bold theme-text-muted uppercase tracking-wider flex items-center gap-2">
                    <span>1. Setup</span>
                    <span id="setupSummary" class="hidden text-[11px] bg-emerald-950/30 text-emerald-400 border border-emerald-900 px-2 py-0.5 rounded font-mono font-bold uppercase"></span>
                </h2>
                <button onclick="toggleLock()" id="lockBtn" class="text-xs theme-btn-lock border px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1">🔓 Unlock Settings</button>
            </div>
            <div id="setupFields" class="grid grid-cols-2 gap-3 transition-all duration-300">
                <div>
                    <label class="block text-xs theme-text-muted mb-1 font-semibold">Checkpoint Name</label>
                    <input type="text" id="checkpoint" placeholder="e.g. CP 1" class="w-full theme-input border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-900 uppercase">
                </div>
                <div>
                    <label class="block text-xs theme-text-muted mb-1 font-semibold">Volunteer Initials</label>
                    <input type="text" id="volunteer" placeholder="e.g. John" class="w-full theme-input border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-900 uppercase">
                </div>
            </div>
        </section>

        <!-- Fast Entry Log Form -->
        <section class="theme-panel p-4 rounded-xl border shadow flex flex-col gap-3">
            <h2 class="text-sm font-bold theme-text-muted uppercase tracking-wider">2. Enter Bib</h2>
            <div class="flex gap-3 items-stretch">
                <div class="flex-grow">
                    <input type="tel" id="bibInput" inputmode="numeric" pattern="[0-9]*" placeholder="0" class="w-full h-16 theme-input text-center text-4xl font-black border-2 rounded-xl px-2 focus:outline-none focus:border-blue-900 transition">
                </div>
                <button onclick="checkDuplicateAndLog()" class="bg-blue-800 hover:bg-blue-700 active:scale-95 text-white font-extrabold text-lg px-6 rounded-xl shadow-lg transition duration-150 flex items-center justify-center">LOG</button>
            </div>
            <div class="mt-1 relative">
                <label id="remarkLabel" class="block text-xs theme-text-muted mb-1 font-semibold">Remark (Optional)</label>
                <input type="text" id="remarkInput" onfocus="clearInlineToast()" placeholder="e.g. Missed helper, penalty, etc." class="w-full theme-input border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-900 transition-all duration-200">
            </div>
        </section>

        <!-- ⏱️ SPLIT TIME CALCULATOR PANEL -->
        <section class="theme-panel p-3 rounded-xl border shadow flex flex-col gap-2">
            <h2 class="text-[10px] font-bold theme-text-muted uppercase tracking-widest flex items-center gap-1">⏱️ Live Split Calculator</h2>
            <div class="grid grid-cols-2 gap-2 text-center text-xs">
                <div class="theme-input p-2 rounded border">
                    <span class="block text-[10px] theme-text-muted font-semibold uppercase">Last Runner</span>
                    <span id="splitLastRunner" class="font-extrabold text-yellow-500 text-sm">-</span>
                </div>
                <div class="theme-input p-2 rounded border">
                    <span class="block text-[10px] theme-text-muted font-semibold uppercase">Pacing Split Gap</span>
                    <span id="splitGapTime" class="font-extrabold text-indigo-400 text-sm">-- : --</span>
                </div>
            </div>
        </section>

        <!-- Stats Panel -->
        <div class="grid grid-cols-2 gap-3">
            <div class="theme-panel p-3 rounded-lg border text-center">
                <div class="text-xs theme-text-muted font-semibold mb-1">Total Logs</div>
                <div id="totalCount" class="text-2xl font-black text-blue-500">0</div>
            </div>
            <div class="theme-panel p-3 rounded-lg border text-center">
                <div class="text-xs theme-text-muted font-semibold mb-1">Unique Runners</div>
                <div id="uniqueCount" class="text-2xl font-black text-indigo-500">0</div>
            </div>
        </div>

        <!-- Scan History -->
        <section class="flex-grow theme-panel rounded-xl border shadow flex flex-col overflow-hidden min-h-[200px]">
            <div class="px-4 py-3 border-b theme-border flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold theme-text-muted uppercase tracking-wider">Local Scan History</h3>
                    <button onclick="clearDatabase()" class="text-xs text-red-500 hover:text-red-400 font-bold">Clear All</button>
                </div>
                <div class="relative">
                    <input type="text" id="searchBar" oninput="loadHistory()" placeholder="🔍 Filter by Bib, Checkpoint..." class="w-full theme-input border rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-900">
                </div>
            </div>
            <div id="logList" class="overflow-y-auto flex-grow divide-y theme-border max-h-[300px]"></div>
        </section>

        <!-- Export -->
        <section class="flex flex-col gap-2">
            <button onclick="exportCSV()" class="w-full bg-emerald-800 hover:bg-emerald-700 active:scale-95 text-white font-black py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2">📥 Export & Download CSV</button>
        </section>
    </main>

    <script>
        let db;
        let deferredPrompt;
        let isSetupLocked = false;
        let inlineToastTimeout;
        let lastGeoposition = { latitude: null, longitude: null }; // Global persistent tracking
        
        const DEFAULT_SYNC_URL = "https://script.google.com/macros/s/AKfycbzQQE7TLzm1muiHhBDrtenUZye0I8Yb2U3tNwq_3PsmtmvoddbeL11Kzm4P2RXqbCF_Ig/exec";
        
        let syncUrl = localStorage.getItem("syncUrl") || DEFAULT_SYNC_URL;
        if (!syncUrl || syncUrl.trim() === "" || syncUrl.includes("AKfycbweiZ7rijKmR-D-gwG9SMDTj_ehesBP_85hqAWipzVpGjFMk4d2MTZh2FUQZfpMqy7Kiw")) {
            syncUrl = DEFAULT_SYNC_URL;
            localStorage.setItem("syncUrl", DEFAULT_SYNC_URL);
        }

        // --- FEATURE: THEME CONTROLLER ENGINE ---
        function applyTheme() {
            const currentTheme = localStorage.getItem("theme") || "dark";
            const themeBtn = document.getElementById("themeBtn");
            if (currentTheme === "light") {
                document.body.classList.add("light-theme");
                themeBtn.textContent = "🌙";
            } else {
                document.body.classList.remove("light-theme");
                themeBtn.textContent = "☀️";
            }
        }

        function toggleTheme() {
            const isLight = document.body.classList.contains("light-theme");
            localStorage.setItem("theme", isLight ? "dark" : "light");
            applyTheme();
        }

        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/tablet|ipad|playbook|silk/i.test(ua)) return "Tablet";
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Opera Mini/i.test(ua)) {
                return /iPhone|iPod/i.test(ua) ? "iPhone" : "Android Mobile";
            }
            return "PC";
        }

        const dbRequest = indexedDB.open("RaceLoggerDB", 1);
        dbRequest.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("logs")) {
                db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
            }
        };
        dbRequest.onsuccess = function(e) {
            db = e.target.result;
            applyTheme(); // Load theme state early
            updateSyncStatusLabel();
            loadSettingsState();
            loadHistory();
            startContinuousGPSWatch(); 
            updateQueueStatus(); 
            attemptSync();
        };

        function toggleSettings() {
            const modal = document.getElementById("settingsModal");
            document.getElementById("syncUrlInput").value = syncUrl;
            modal.classList.toggle("hidden");
        }

        function saveSettings() {
            const inputVal = document.getElementById("syncUrlInput").value.trim();
            const newUrl = inputVal || DEFAULT_SYNC_URL;
            localStorage.setItem("syncUrl", newUrl);
            syncUrl = newUrl;
            toggleSettings();
            updateSyncStatusLabel();
            attemptSync();
        }

        function updateSyncStatusLabel() {
            const status = document.getElementById("syncStatus");
            status.textContent = !syncUrl ? "Offline Mode" : "Auto-Sync";
            status.className = !syncUrl ? "text-[10px] bg-yellow-955 text-yellow-400 border border-yellow-800 px-2 py-0.5 rounded-full font-bold" : "text-[10px] bg-emerald-950 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded-full font-bold";
        }

        function toggleLock() {
            isSetupLocked = !isSetupLocked;
            localStorage.setItem("settingsLocked", isSetupLocked);
            applyLockState();
        }

        function applyLockState() {
            const cpInput = document.getElementById("checkpoint");
            const volInput = document.getElementById("volunteer");
            const lockBtn = document.getElementById("lockBtn");
            const setupFields = document.getElementById("setupFields");
            const setupSummary = document.getElementById("setupSummary");
            const setupHeaderRow = document.getElementById("setupHeaderRow");

            cpInput.disabled = isSetupLocked;
            volInput.disabled = isSetupLocked;

            const cpVal = cpInput.value.toUpperCase().trim() || 'N/A';
            const volVal = volInput.value.toUpperCase().trim() || 'N/A';

            if (isSetupLocked) {
                lockBtn.textContent = "🔒 Settings Locked";
                lockBtn.className = "text-xs bg-emerald-950 text-emerald-400 border border-emerald-800 px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                localStorage.setItem("checkpointVal", cpVal);
                localStorage.setItem("volunteerVal", volVal);
                setupFields.classList.add("hidden"); 
                setupHeaderRow.classList.replace("mb-3", "mb-0"); 
                setupSummary.textContent = `${cpVal} • ${volVal}`; 
                setupSummary.classList.remove("hidden"); 
            } else {
                lockBtn.textContent = "🔓 Unlock Settings";
                lockBtn.className = "text-xs theme-btn-lock border px-2.5 py-1 rounded-md font-bold transition flex items-center gap-1";
                setupFields.classList.remove("hidden"); 
                setupHeaderRow.classList.replace("mb-0", "mb-3"); 
                setupSummary.classList.add("hidden"); 
            }
        }

        function loadSettingsState() {
            isSetupLocked = localStorage.getItem("settingsLocked") === "true";
            document.getElementById("checkpoint").value = localStorage.getItem("checkpointVal") || "";
            document.getElementById("volunteer").value = localStorage.getItem("volunteerVal") || "";
            applyLockState();
        }

        function triggerInlineToast(bib, statusText, remarkText = "", isError = false) {
            const remarkInput = document.getElementById('remarkInput');
            const remarkLabel = document.getElementById('remarkLabel');
            clearTimeout(inlineToastTimeout);

            let displayText = isError ? `⚠️ Bib ${bib}: ${statusText}` : `✅ Bib ${bib}: ${statusText}`;
            if (remarkText) displayText += ` (${remarkText})`;

            remarkInput.value = displayText;
            remarkInput.disabled = true;
            
            if (isError) {
                remarkInput.className = "w-full bg-red-950 border-red-900 text-red-300 rounded-lg px-3 py-2 text-sm font-bold text-center";
                remarkLabel.className = "block text-xs text-red-400 mb-1 font-bold";
                remarkLabel.textContent = "Status Alert";
            } else {
                remarkInput.className = "w-full bg-emerald-950 border-emerald-900 text-emerald-300 rounded-lg px-3 py-2 text-sm font-bold text-center";
                remarkLabel.className = "block text-xs text-emerald-400 mb-1 font-bold";
                remarkLabel.textContent = "Last Action Status";
            }

            inlineToastTimeout = setTimeout(() => { clearInlineToast(); }, 4000);
        }

        function clearInlineToast() {
            const remarkInput = document.getElementById('remarkInput');
            const remarkLabel = document.getElementById('remarkLabel');
            clearTimeout(inlineToastTimeout);
            remarkInput.disabled = false;
            remarkInput.value = "";
            remarkInput.placeholder = "e.g. Missed helper, penalty, etc.";
            remarkInput.className = "w-full theme-input border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-900";
            remarkLabel.className = "block text-xs theme-text-muted mb-1 font-semibold";
            remarkLabel.textContent = "Remark (Optional)";
        }

        function checkDuplicateAndLog() {
            const bibInput = document.getElementById('bibInput');
            const bib = bibInput.value.trim();
            if (!bib) return;

            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const now = new Date();
                const duplicate = logs.find(log => log.bib === bib && (now - new Date(log.time)) < 600000);

                if (duplicate && !confirm(`⚠️ Bib ${bib} was logged recently. Log again?`)) {
                    bibInput.value = '';
                    bibInput.focus();
                } else {
                    logEntry(bib);
                }
            };
        }

        function startContinuousGPSWatch() {
            const gpsDot = document.getElementById("gpsDot");
            const gpsText = document.getElementById("gpsText");

            if (!navigator.geolocation) {
                gpsText.textContent = "NO GPS HW";
                return;
            }

            navigator.geolocation.watchPosition(
                (pos) => {
                    lastGeoposition.latitude = pos.coords.latitude;
                    lastGeoposition.longitude = pos.coords.longitude;
                    
                    const acc = pos.coords.accuracy;
                    if (acc <= 15) {
                        gpsDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                        gpsText.textContent = `3D LOCK (${Math.round(acc)}m)`;
                    } else {
                        gpsDot.className = "w-2 h-2 rounded-full bg-yellow-600 animate-pulse";
                        gpsText.textContent = `WEAK (${Math.round(acc)}m)`;
                    }
                },
                (err) => {
                    gpsDot.className = "w-2 h-2 rounded-full bg-red-600 animate-pulse";
                    if (err.code === 1) {
                        gpsText.textContent = "DENIED";
                    } else {
                        gpsText.textContent = "SEARCHING";
                    }
                    lastGeoposition = { latitude: null, longitude: null };
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function logEntry(bib) {
            const bibInput = document.getElementById('bibInput');
            const remarkInput = document.getElementById('remarkInput');
            const checkpoint = document.getElementById('checkpoint').value.trim() || 'Unknown';
            const volunteer = document.getElementById('volunteer').value.trim() || 'Unknown';
            const remark = remarkInput.disabled ? "" : remarkInput.value.trim();

            const now = new Date();
            const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const entry = {
                bib: bib,
                time: timestampStr,
                volunteer: volunteer.toUpperCase(),
                checkpoint: checkpoint.toUpperCase(),
                remark: remark,
                device: getDeviceType(),
                latitude: lastGeoposition.latitude,
                longitude: lastGeoposition.longitude,
                synced: false
            };

            saveToDB(entry);
            bibInput.value = '';
            bibInput.focus();
        }

        function saveToDB(entry) {
            const transaction = db.transaction(["logs"], "readwrite");
            const store = transaction.objectStore("logs");
            const request = store.add(entry);

            request.onsuccess = function(e) {
                entry.id = e.target.result;
                loadHistory();
                triggerInlineToast(entry.bib, "Saved Locally!", entry.remark, false);
                if (navigator.vibrate) navigator.vibrate(50);
                if (syncUrl) syncSingleRow(entry);
            };
        }

        function updateQueueStatus() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const unsyncedCount = logs.filter(log => !log.synced).length;
                const badge = document.getElementById("queueBadge");
                const countText = document.getElementById("queueCount");

                if (unsyncedCount > 0) {
                    badge.classList.remove("hidden");
                    countText.textContent = unsyncedCount;
                } else {
                    badge.classList.add("hidden");
                }
            };
        }

        function syncSingleRow(row) {
            if (!syncUrl || row.synced) return;

            fetch(syncUrl, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(row)
            })
            .then(async res => {
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { 
                    throw new Error("Invalid response style: " + text);
                }
                
                if (data.status === "success") {
                    row.synced = true;
                    const transaction = db.transaction(["logs"], "readwrite");
                    const store = transaction.objectStore("logs");
                    store.put(row);
                    transaction.oncomplete = function() { 
                        loadHistory(); 
                    };
                } else {
                    throw new Error(data.message || "Script execution error.");
                }
            })
            .catch(err => {
                console.error("Sync Failure:", err);
                updateQueueStatus(); 
            });
        }

        function attemptSync() {
            if (!syncUrl) return;
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();
            request.onsuccess = function() {
                const logs = request.result;
                const unsynced = logs.filter(log => !log.synced);
                if (unsynced.length > 0) {
                    unsynced.forEach(log => syncSingleRow(log));
                } else {
                    updateQueueStatus();
                }
            };
        }

        window.addEventListener('online', attemptSync);

        function calculateLiveSplits(logs) {
            const splitLastRunner = document.getElementById("splitLastRunner");
            const splitGapTime = document.getElementById("splitGapTime");

            if (logs.length < 1) {
                splitLastRunner.textContent = "-";
                splitGapTime.textContent = "-- : --";
                return;
            }

            const sorted = [...logs].sort((a, b) => new Date(a.time) - new Date(b.time));
            const lastLog = sorted[sorted.length - 1];

            splitLastRunner.textContent = `Bib ${lastLog.bib}`;

            if (sorted.length < 2) {
                splitGapTime.textContent = "Leader";
                return;
            }

            const secondLastLog = sorted[sorted.length - 2];
            const diffMs = new Date(lastLog.time) - new Date(secondLastLog.time);
            const diffSeconds = Math.floor(diffMs / 1000);

            if (diffSeconds < 0) {
                splitGapTime.textContent = "0s";
                return;
            }

            const mins = Math.floor(diffSeconds / 60);
            const secs = diffSeconds % 60;

            if (mins > 0) {
                splitGapTime.textContent = `+ ${mins}m ${secs}s`;
            } else {
                splitGapTime.textContent = `+ ${secs}s`;
            }
        }

        function loadHistory() {
            const transaction = db.transaction(["logs"], "readonly");
            const store = transaction.objectStore("logs");
            const request = store.getAll();

            request.onsuccess = function() {
                const logs = request.result;
                const searchQuery = document.getElementById('searchBar').value.toLowerCase().trim();
                
                document.getElementById('totalCount').textContent = logs.length;
                document.getElementById('uniqueCount').textContent = new Set(logs.map(l => l.bib)).size;

                calculateLiveSplits(logs);
                updateQueueStatus();

                const frequencies = {};
                logs.forEach(l => frequencies[l.bib] = (frequencies[l.bib] || 0) + 1);

                const logList = document.getElementById('logList');
                logList.innerHTML = '';

                [...logs].reverse().filter(log => {
                    return log.bib.toLowerCase().includes(searchQuery) || 
                           log.checkpoint.toLowerCase().includes(searchQuery) || 
                           log.volunteer.toLowerCase().includes(searchQuery);
                }).forEach(log => {
                    const row = document.createElement('div');
                    row.className = 'px-4 py-3 flex justify-between items-center hover:bg-neutral-500/10 border-b theme-border';
                    const remarkHTML = log.remark ? `<div class="text-[11px] text-yellow-500 italic mt-0.5">💬 ${log.remark}</div>` : '';
                    const freqBadge = frequencies[log.bib] > 1 ? `<span class="text-[10px] bg-indigo-950 text-indigo-400 border border-indigo-900 px-1.5 py-0.5 rounded font-bold">${frequencies[log.bib]}x</span>` : '';

                    row.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <span class="text-xl font-black text-yellow-500">${log.bib}</span>
                                ${freqBadge}
                                <span class="text-[10px] bg-neutral-900 border border-neutral-800 px-1.5 py-0.5 rounded text-neutral-400 font-bold tracking-wide">${log.checkpoint}</span>
                            </div>
                            <div class="text-[10px] theme-text-muted mt-0.5">${log.time} • By: ${log.volunteer}</div>
                            ${remarkHTML}
                        </div>
                        <div class="text-right flex items-center gap-3 shrink-0">
                            <div class="flex flex-col items-end gap-1">
                                <span class="text-[10px] ${log.synced ? 'text-emerald-500 font-bold' : 'text-yellow-500 font-bold'}">${log.synced ? 'Synced' : 'Queued'}</span>
                            </div>
                            <button onclick="deleteRow(${log.id}, '${log.bib}', '${log.time}')" class="text-red-500 hover:text-red-400 p-1 text-base">🗑️</button>
                        </div>
                    `;
                    logList.appendChild(row);
                });
            };
        }

        function deleteRow(id, bib, time) {
            if (!confirm(`Delete entry for Bib ${bib}?`)) return;
            if (syncUrl) {
                fetch(syncUrl, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "delete", bib: bib, time: time })
                }).catch(err => console.error(err));
            }
            const transaction = db.transaction(["logs"], "readwrite");
            transaction.objectStore("logs").delete(id);
            transaction.oncomplete = function() { loadHistory(); };
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered Successfully', reg.scope))
                    .catch(err => console.log('Service Worker Registration Failed:', err));
            });
        }

        function exportCSV() {
            const transaction = db.transaction(["logs"], "readonly");
            const request = transaction.objectStore("logs").getAll();
            request.onsuccess = function() {
                if (request.result.length === 0) return;
                let csv = "data:text/csv;charset=utf-8,ID,Bib,Time,Checkpoint,Volunteer,Remark,Device\n";
                request.result.forEach(l => { csv += `${l.id},"${l.bib}","${l.time}","${l.checkpoint}","${l.volunteer}","${l.remark || ''}","${l.device}"\n`; });
                const link = document.createElement("a");
                link.setAttribute("href", encodeURI(csv));
                link.setAttribute("download", `Race_Logs_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        function clearDatabase() {
            if (!confirm("Erase all local entries?")) return;
            const transaction = db.transaction(["logs"], "readwrite");
            transaction.objectStore("logs").clear();
            transaction.oncomplete = function() { loadHistory(); };
        }

        document.getElementById('bibInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkDuplicateAndLog(); });
        document.getElementById('remarkInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') checkDuplicateAndLog(); });
    </script>
</body>
</html>
